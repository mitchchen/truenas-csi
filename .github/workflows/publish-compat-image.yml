name: Publish TrueNAS 26 compatibility image
on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        default: v1.1.1-truenas26.1
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: VERSION=${{ inputs.tag }}
          tags: ghcr.io/${{ github.repository_owner }}/truenas-csi:${{ inputs.tag }}
